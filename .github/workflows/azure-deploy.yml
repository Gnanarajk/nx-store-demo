name: Deploy to Azure

on:
  push:
    branches:
      - main
      - nx-cloud-setup

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build applications
        run: |
          npx nx build host --configuration=production --skip-nx-cache
          npx nx build productsRemote --configuration=production --skip-nx-cache
          npx nx build productDetailRemote --configuration=production --skip-nx-cache

      - name: Upload Host artifact
        uses: actions/upload-artifact@v4
        with:
          name: host
          path: dist/apps/host
          retention-days: 1

      - name: Upload Products artifact
        uses: actions/upload-artifact@v4
        with:
          name: products
          path: dist/apps/productsRemote
          retention-days: 1

      - name: Upload ProductDetail artifact
        uses: actions/upload-artifact@v4
        with:
          name: productdetail
          path: dist/apps/productDetailRemote
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download Host artifact
        uses: actions/download-artifact@v4
        with:
          name: host
          path: ./host

      - name: Download Products artifact
        uses: actions/download-artifact@v4
        with:
          name: products
          path: ./products

      - name: Download ProductDetail artifact
        uses: actions/download-artifact@v4
        with:
          name: productdetail
          path: ./productdetail

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Host
        run: |
          cd host && zip -r ../host.zip * && cd ..
          az webapp deployment source config-zip --name nxstore-host --resource-group nx-store-demo-rg --src host.zip

      - name: Deploy Products Remote
        run: |
          cd products && zip -r ../products.zip * && cd ..
          az webapp deployment source config-zip --name nxstore-products --resource-group nx-store-demo-rg --src products.zip

      - name: Deploy Product Detail Remote
        run: |
          cd productdetail && zip -r ../detail.zip * && cd ..
          az webapp deployment source config-zip --name nxstore-productdetail --resource-group nx-store-demo-rg --src detail.zip

      - name: Azure logout
        run: az logout
