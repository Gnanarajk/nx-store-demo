name: Deploy to Azure

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build applications
        run: |
          npx nx build host --configuration=production --skip-nx-cache
          npx nx build productsRemote --configuration=production --skip-nx-cache
          npx nx build productDetailRemote --configuration=production --skip-nx-cache

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/apps/host
            dist/apps/productsRemote
            dist/apps/productDetailRemote
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Host
        uses: azure/webapps-deploy@v3
        with:
          app-name: nxstore-host
          package: ./dist/apps/host

      - name: Deploy Products Remote
        uses: azure/webapps-deploy@v3
        with:
          app-name: nxstore-products
          package: ./dist/apps/productsRemote

      - name: Deploy Product Detail Remote
        uses: azure/webapps-deploy@v3
        with:
          app-name: nxstore-productdetail
          package: ./dist/apps/productDetailRemote

      - name: Azure logout
        run: az logout
