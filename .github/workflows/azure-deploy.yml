name: Deploy to Azure

on:
  push:
    branches:
      - main
      - nx-cloud-setup

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build applications
        run: |
          npx nx build host --configuration=production --skip-nx-cache
          npx nx build productsRemote --configuration=production --skip-nx-cache
          npx nx build productDetailRemote --configuration=production --skip-nx-cache
          npx nx build api --configuration=production --skip-nx-cache

      - name: Zip host artifact
        run: zip -j host.zip dist/apps/host/*

      - name: Zip products artifact
        run: zip -j products.zip dist/apps/productsRemote/*

      - name: Zip productdetail artifact
        run: zip -j detail.zip dist/apps/productDetailRemote/*

      - name: Zip api artifact
        run: zip -j api.zip apps/api/dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifacts
          path: |
            host.zip
            products.zip
            detail.zip
            api.zip
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifacts
          path: ./

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Host
        run: az webapp deployment source config-zip --name nxstore-host --resource-group nx-store-demo-rg --src host.zip

      - name: Deploy Products Remote
        run: az webapp deployment source config-zip --name nxstore-products --resource-group nx-store-demo-rg --src products.zip

      - name: Deploy Product Detail Remote
        run: az webapp deployment source config-zip --name nxstore-productdetail --resource-group nx-store-demo-rg --src detail.zip

      - name: Deploy API
        run: az webapp deployment source config-zip --name nxstore-api --resource-group nx-store-demo-rg --src api.zip

      - name: Azure logout
        run: az logout
